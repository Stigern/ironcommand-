# Render.com deployment config for Iron Command relay server
# Deploy: connect GitHub repo → Render auto-detects this file
services:
  - type: web
    name: ironcommand-server
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
